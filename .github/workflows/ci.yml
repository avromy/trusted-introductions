name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh deterministic lockfile
        run: npm install --package-lock-only
      - name: Commit refreshed lockfile to this PR branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: refresh lockfile for patched test dependencies"
          git push origin HEAD:${{ github.head_ref }}
      - name: Install deterministic dependencies
        run: npm ci
      - name: Audit all locked dependencies
        run: npm audit --audit-level=high
      - name: Validate repository governance and migrations
        id: repository_quality
        run: |
          set +e
          npm run validate:repo > repository-quality.txt 2>&1
          status=$?
          cat repository-quality.txt
          exit $status
      - name: Upload repository validation diagnostics
        if: failure() && steps.repository_quality.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: repository-quality-diagnostics
          path: repository-quality.txt
          if-no-files-found: error
          retention-days: 7
      - name: Verify required documentation exists
        run: |
          set -euo pipefail
          required=(
            docs/Audit.md
            docs/PRD.md
            docs/Architecture.md
            docs/DatabaseSchema.md
            docs/API.md
            docs/EngineeringStandards.md
            docs/PRGovernance.md
            docs/UXPrinciples.md
            docs/DesignSystem.md
            docs/Roadmap.md
            docs/Milestones.md
            docs/Backlog.md
            docs/TestingStrategy.md
            docs/Deployment.md
            docs/Contributing.md
            docs/SupplyChainSecurity.md
            docs/handoffs/EngineeringHandoffTemplate.md
            .env.example
            .github/pull_request_template.md
            .github/CODEOWNERS
            .github/dependabot.yml
            package-lock.json
          )
          for file in "${required[@]}"; do
            test -s "$file"
          done
          test -d docs/TechnicalDecisions
      - name: Validate environment variable presence
        run: npm run validate:env
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          SUPABASE_STORAGE_RESUME_BUCKET: private-resumes
      - name: Lint
        run: npm run lint
      - name: Typecheck
        id: typecheck
        run: |
          set +e
          npm run typecheck > typecheck.txt 2>&1
          status=$?
          cat typecheck.txt
          exit $status
      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.txt
          if-no-files-found: error
          retention-days: 7
      - name: Unit tests
        id: unit_tests
        run: npm run test -- --run
      - name: Generate unit-test failure report
        if: failure() && steps.unit_tests.outcome == 'failure'
        run: npx vitest run --reporter=junit --outputFile=vitest-junit.xml || true
      - name: Upload unit-test failure report
        if: failure() && steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: vitest-junit.xml
          if-no-files-found: error
          retention-days: 7
      - name: Build
        id: build
        run: |
          set +e
          npm run build > build.txt 2>&1
          status=$?
          cat build.txt
          exit $status
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          SUPABASE_STORAGE_RESUME_BUCKET: private-resumes
      - name: Upload build diagnostics
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.txt
          if-no-files-found: error
          retention-days: 7
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Browser E2E
        run: npm run e2e
        env:
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          SUPABASE_STORAGE_RESUME_BUCKET: private-resumes
